apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.cozystack-platform
  namespace: cozy-system
spec:
  variant: isp-full
  components:
    platform:
      values:
        authentication:
          oidc:
            enabled: false
            keycloakExtraRedirectUri: ""
        branding: {}
        bundles:
          disabledPackages: []
          enabledPackages:
            - velero
            - nfs-driver
        networking:
          clusterDomain: cozy.local
          joinCIDR: 100.64.0.0/16
          podCIDR: 10.244.0.0/16
          podGateway: 10.244.0.1
          serviceCIDR: 10.96.0.0/16
        publishing:
          apiServerEndpoint: https://192.168.222.20:6443
          certificates:
            issuerName: letsencrypt-prod
            solver: dns01
          exposedServices:
            - dashboard
          externalIPs:
            - 192.168.222.21
            - 192.168.222.22
            - 192.168.222.23
          host: myk8s.se
          ingressName: tenant-root
        scheduling:
          globalAppTopologySpreadConstraints: ""
