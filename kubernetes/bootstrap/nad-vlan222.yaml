apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: iot-vlan222
  namespace: default
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: network
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "iot-vlan222",
      "plugins": [
        {
          "type": "bridge",
          "bridge": "br222",
          "promiscMode": true,
          "disableContainerInterface": true
        }
      ]
    }
