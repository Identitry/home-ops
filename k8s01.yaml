# Provides cluster specific configuration options.
cluster:
  id: mjxM4eRes5WsXdOx7CRBJ8ud39aJ7hoxKNOUFOH1kvA= # Globally unique identifier for this cluster (base64 encoded random 32 bytes).
  secret: dPgNSa/+tLjFILFVDJGUGWwXNRLgcfPaw3MUFq8rjyA= # Shared secret of cluster (base64 encoded random 32 bytes).
  # Provides control plane specific configuration options.
  controlPlane:
    endpoint: https://192.168.222.20:6443 # Endpoint is the canonical controlplane endpoint, which can be an IP address or a DNS hostname.
  clusterName: k8s # Configures the cluster's name.
  # Provides cluster specific network configuration options.
  network:
    # The CNI used.
    cni:
      name: none # Name of CNI to use.
    dnsDomain: cozy.local # The domain used by Kubernetes DNS.
    # The pod subnet CIDR.
    podSubnets:
      - 10.244.0.0/16
    # The service subnet CIDR.
    serviceSubnets:
      - 10.96.0.0/16
  token: 9ku7l4.4g73f53o73c92bgb # The [bootstrap token](https://kubernetes.io/docs/reference/access-authn-authz/bootstrap-tokens/) used to join the cluster.
  secretboxEncryptionSecret: EcygJq4NdJFNzk8WPeuEjPOwBsuZ2QA32AVTcv/ChvA= # A key used for the [encryption of secret data at rest](https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/).
  # The base64 encoded root certificate authority used by Kubernetes.
  ca:
    crt: 
    key: 
  # The base64 encoded aggregator certificate authority used by Kubernetes for front-proxy certificate generation.
  aggregatorCA:
    crt: 
    key: 
  # The base64 encoded private key for service account token generation.
  serviceAccount:
    key: 
  # API server specific configuration options.
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.33.0 # The container image used in the API server manifest.
    # Extra certificate subject alternative names for the API server's certificate.
    certSANs:
      - 192.168.222.20
      - 127.0.0.1
    disablePodSecurityPolicy: true # Disable PodSecurityPolicy in the API server and default manifests.
    # Configure the API server admission plugins.
    admissionControl:
      - name: PodSecurity # Name is the name of the admission controller.
        # Configuration is an embedded configuration object to be used as the plugin's
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          defaults:
            audit: restricted
            audit-version: latest
            enforce: baseline
            enforce-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
            runtimeClasses: []
            usernames: []
          kind: PodSecurityConfiguration
    # Configure the API server audit policy.
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
          # # Configure the API server authorization config. Node and RBAC authorizers are always added irrespective of the configuration.
          # authorizationConfig:
          #     - type: Webhook # Type is the name of the authorizer. Allowed values are `Node`, `RBAC`, and `Webhook`.
          #       name: webhook # Name is used to describe the authorizer.
          #       # webhook is the configuration for the webhook authorizer.
          #       webhook:
          #         connectionInfo:
          #             type: InClusterConfig
          #         failurePolicy: Deny
          #         matchConditionSubjectAccessReviewVersion: v1
          #         matchConditions:
          #             - expression: has(request.resourceAttributes)
          #             - expression: '!(\''system:serviceaccounts:kube-system\'' in request.groups)'
          #         subjectAccessReviewVersion: v1
          #         timeout: 3s
          #     - type: Webhook # Type is the name of the authorizer. Allowed values are `Node`, `RBAC`, and `Webhook`.
          #       name: in-cluster-authorizer # Name is used to describe the authorizer.
          #       # webhook is the configuration for the webhook authorizer.
          #       webhook:
          #         connectionInfo:
          #             type: InClusterConfig
          #         failurePolicy: NoOpinion
          #         matchConditionSubjectAccessReviewVersion: v1
          #         subjectAccessReviewVersion: v1
          #         timeout: 3s
  # Controller manager server specific configuration options.
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.33.0 # The container image used in the controller manager manifest.
    # Extra arguments to supply to the controller manager.
    extraArgs:
      bind-address: 0.0.0.0
  # Kube-proxy server-specific configuration options
  proxy:
    disabled: true # Disable kube-proxy deployment on cluster bootstrap.
    image: registry.k8s.io/kube-proxy:v1.33.0 # The container image used in the kube-proxy manifest.
  # Scheduler server specific configuration options.
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.33.0 # The container image used in the scheduler manifest.
    # Extra arguments to supply to the scheduler.
    extraArgs:
      bind-address: 0.0.0.0
  # Configures cluster member discovery.
  discovery:
    enabled: false # Enable the cluster membership discovery feature.
    # Configure registries used for cluster member discovery.
    registries:
      # Kubernetes registry uses Kubernetes API server to discover cluster members and stores additional information
      kubernetes:
        disabled: true # Disable Kubernetes discovery registry.
      # Service registry is using an external service to push and pull information about cluster members.
      service: {}
      # # External service endpoint.
      # endpoint: https://discovery.talos.dev/
  # Etcd specific configuration options.
  etcd:
    # The `ca` is the root certificate authority of the PKI.
    ca:
      crt: 
      key: 
    # The `advertisedSubnets` field configures the networks to pick etcd advertised IP from.
    advertisedSubnets:
      - 192.168.222.0/24
      # # The container image used to create the etcd service.
      # image: gcr.io/etcd-development/etcd:v3.6.5
  allowSchedulingOnControlPlanes: true # Allows running workload on control-plane nodes.
  # # A key used for the [encryption of secret data at rest](https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/).
# # Decryption secret example (do not use in production!).
# aescbcEncryptionSecret: z01mye6j16bspJYtTB/5SFX8j7Ph4JXxM2Xuu4vsBPM=

# # Core DNS specific configuration options.
